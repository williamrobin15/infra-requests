# Runs when a request PR is merged to main -- i.e. AFTER a human approver
# (who is not the requester, enforced by branch protection) has approved
# and all guardrail checks passed. This is the "Apply" step.
name: apply

on:
  push:
    branches: [main]
    paths:
      - "requests/**"

permissions:
  contents: write
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed request dir
        id: dir
        run: |
          d=$(git diff --name-only HEAD~1 HEAD | grep '^requests/' | head -1 | xargs dirname)
          echo "path=$d" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: ${{ steps.dir.outputs.path }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Stamp created_at into ttl-expiry.json and commit
        working-directory: ${{ steps.dir.outputs.path }}
        run: |
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          sed -i "s/GENERATED_AT_MERGE_TIME/$now/" ttl-expiry.json || true
          git config user.name "infra-bot"
          git config user.email "infra-bot@users.noreply.github.com"
          git add ttl-expiry.json
          git commit -m "chore: stamp ttl expiry for ${{ steps.dir.outputs.path }} [skip ci]" || echo "nothing to commit"
          git push
